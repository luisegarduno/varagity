services:

  llamacpp:
    container_name: llamacpp
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1              # first GPU (device 0) — infinity is pinned to device 1
              capabilities: [gpu]
    volumes:
      - ${models_volume}:/models:ro           # no copy — model stays on host disk
    ports:
      - "8080:8080"
    # --parallel 1 is load-bearing: newer server builds default to FOUR slots
    # sharing the one --ctx-size KV pool (server-cuda is a moving tag; the
    # default changed under us at b9935). Two ~8k contextualization prompts
    # cached on different slots then exhaust the pool mid-decode ("Context
    # size has been exceeded"). One slot = the full window per request, plus
    # stable prompt-cache reuse across a document's chunks (spec §9.4).
    command: >
      -m /models/${BASE_MODEL}
      --host 0.0.0.0 --port 8080
      --jinja -ngl 99 --threads -1 --ctx-size ${LLM_CONTEXT_TOKENS:-16384}
      --parallel 1
      --temp 0.6 --min-p 0.0 --top-p 0.95 --top-k 20 --repeat-penalty 1.05
      -ot ".ffn_(up|down)_exps.=CPU"
      --no-webui
    healthcheck:
      # /health returns 503 while the model loads; generous retries cover it.
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  infinity-embeddings:
    container_name: infinity-embeddings
    # Pinned tag (digest-identical to the previously used latest-trt-onnx):
    # upstream does not CI-build the trt-onnx images, so `latest` is a moving tag.
    image: michaelf34/infinity:0.0.76-trt-onnx
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]     # pin to physical GPU 1 — the optimum engine
              capabilities: [gpu]   # ignores INFINITY_DEVICE_ID, so pin at the Docker layer
    volumes:
      - ${embeddings_volume}:/models
    ports:
      - 192.168.86.21:8081:8081
    environment:
      INFINITY_HOST: '0.0.0.0'
      INFINITY_PORT: 8081
      INFINITY_API_KEY: ${secret_infinity_key}
      INFINITY_ANONYMOUS_USAGE_STATS: '0'
      INFINITY_URL_PREFIX: '/v1'
      INFINITY_MODEL_ID: '/models/multilingual-e5-large-instruct;/models/bge-reranker-v2-m3'
      INFINITY_SERVED_MODEL_NAME: 'infloat/multilingual-e5-large-instruct;BAAI/bge-reranker-v2-m3'
      INFINITY_DEVICE: cuda
      INFINITY_DEVICE_ID: '0'       # device 0 *inside* the container = physical GPU 1 (see device_ids)
      INFINITY_ENGINE: 'optimum'
      INFINITY_BATCH_SIZE: '32;4'
    command:
      - v2
    healthcheck:
      # /health is NOT under INFINITY_URL_PREFIX (routes like /v1/embeddings are).
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: always

  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs on first boot only (empty data dir); reset with `docker compose down -v`.
      - ./varagity/stores/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - varagity-net
    restart: unless-stopped

  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # dev-only posture (see runbook)
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      # Reachability only: a single-node cluster is `yellow` by design
      # (replicas can never be assigned), so do NOT gate on `green`.
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  prefect:
    container_name: prefect
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      # Default SQLite backing store lives here (plan decision #5); reset
      # with `docker compose down -v` like the other stateful services.
      - prefect:/root/.prefect
    environment:
      PREFECT_SERVER_ANALYTICS_ENABLED: false
    healthcheck:
      # The base image ships no curl/wget — probe with the stdlib, as the
      # official Prefect compose example does (research §2.6).
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health', timeout=4)",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  api:
    container_name: varagity-api
    build:
      context: ./
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Uploads land here via POST /api/documents (v2 Phase 8); mounted now so
      # the API and the CLI app agree on the corpus from day one. The image's
      # user uid defaults to 1000 to match the host owner of ./docs — writes
      # (uploads, per-doc delete) need it (see Dockerfile.api).
      - ./docs:/app/docs
      # POST /api/ingest runs the same parsers as the CLI (v2 Phase 8), so the
      # API shares the model cache: Docling layout/table models and EasyOCR
      # weights download once and survive container recreation.
      - model_cache:/home/user/.cache
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      infinity-embeddings:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      prefect:
        condition: service_healthy
    healthcheck:
      # /api/health answers 200 whenever the API process is alive (dependency
      # state rides in the body); the image ships no curl, so probe with the
      # venv python's stdlib, as the prefect service does.
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=4)",
        ]
      interval: 15s
      timeout: 8s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  web:
    container_name: varagity-web
    build:
      context: ./web
      args:
        # Browser→API origin, inlined at BUILD time (NEXT_PUBLIC_*); changing
        # it requires `docker compose build web`. The default serves the
        # same-host browser; LAN browsers need the host's address here.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # The alpine image ships no curl — probe with node's global fetch.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.13.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      # The image is busybox-based (no curl) — probe with busybox wget.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:12.3.8
    volumes:
      # Provisioned datasource + dashboards (spec_v2 §6.3): `docker compose
      # up` yields working dashboards with no click-ops.
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      # Dev posture (see runbook): default admin/admin stays for edits;
      # anonymous read-only viewing so the provisioned dashboards render
      # without a login step.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      # Alpine-based image — busybox wget, same posture as prometheus.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - varagity-net
    restart: unless-stopped

  # Optional (plan decision #10): orchestration-level flow/task-run metrics
  # polled from the Prefect API. Off by default; enable with
  # `docker compose --profile prefect-exporter up -d`. Scraped in-network
  # (port 8000) — no host port (the api service owns host 8000).
  prefect-exporter:
    container_name: prefect-exporter
    # Do NOT unpin: there is no published compatibility matrix between the
    # exporter and Prefect-server versions — 3.6.1 working against this
    # Prefect 3.x server is verified, not implied by the version numbers.
    image: prefecthq/prometheus-prefect-exporter:3.6.1
    profiles: ["prefect-exporter"]
    environment:
      # The exporter windows its flow-RUN queries to the last OFFSET_MINUTES
      # (default 3 — main.py:22, metrics/flow_runs.py). Our flows are bursty
      # and rare, so a 3-minute window reads 0 for the same reason increase()
      # over the ingest counters does (spec_v3 §6.1). 24h answers "did
      # anything run today?". prefect_flows_total is unwindowed and unaffected.
      OFFSET_MINUTES: "1440"
      # MUST keep the /api suffix: metrics/healthz.py builds its probe as
      # f"{url}/health" with no fixup and SystemExit()s on failure — a wrong
      # URL is a crash-loop, not an empty panel. Do not "clean this up".
      PREFECT_API_URL: ${PREFECT_API_URL}
    depends_on:
      prefect:
        condition: service_healthy
    networks:
      - varagity-net
    restart: unless-stopped

  # Optional: GPU VRAM/utilization via NVIDIA DCGM. Off by default; enable
  # with `docker compose --profile gpu-metrics up -d`. Needs the NVIDIA
  # container toolkit (already required by llamacpp/infinity); consumer-card
  # caveat — several DCGM fields are empty on GeForce parts (see runbook).
  dcgm-exporter:
    container_name: dcgm-exporter
    image: nvidia/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    profiles: ["gpu-metrics"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    cap_add:
      - SYS_ADMIN # DCGM's documented run posture (profiling fields need it)
    networks:
      - varagity-net
    restart: unless-stopped

  app:
    container_name: varagity
    build: ./
    env_file: .env
    volumes:
      - ./docs:/app/docs
      # Model cache for PDF parsing, surviving rebuilds (one-time downloads):
      # Docling's layout/table models land in ~/.cache/huggingface, EasyOCR
      # weights are pinned under ~/.cache/docling/models/EasyOcr — one volume
      # over ~/.cache covers both (verified at implementation, plan Phase 7).
      - model_cache:/home/user/.cache
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      infinity-embeddings:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      prefect:
        condition: service_healthy
    networks:
      - varagity-net
    restart: no

networks:
  varagity-net:

volumes:
  pgdata:
  esdata:
  model_cache:
  prefect:
  prometheus_data:
  grafana_data:
