# Commit-time quality gates (spec §15.3): lint + auto-format (ruff), types
# (mypy), hygiene, and the fast unit suite. Docstring rules (`D`) ride along
# in ruff-check, so an undocumented public function fails the commit.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      # --unsafe: syntax-only check. mkdocs.yml carries a `!!python/name:...`
      # tag (the Material mermaid fence formatter) that the safe loader can't
      # construct; --unsafe still catches genuine YAML syntax errors.
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      # ruff-format IS the project formatter (black-compatible); code is
      # auto-formatted on every commit. Deliberately no separate black hook.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        files: ^(varagity/|main\.py)
        additional_dependencies:
          - pydantic-settings
          - rich
          - openai
          - tenacity
          - langchain-core
          - langchain-text-splitters
          - psycopg
          - pgvector
          - tiktoken
          - elasticsearch
          - prefect
          - jiwer

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit, fast)
        entry: uv run pytest -m "not integration and not e2e"
        language: system
        pass_filenames: false
        always_run: true
