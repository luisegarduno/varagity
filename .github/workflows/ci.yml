# Lint + format + types + unit tests + strict docs build on every push
# (spec §15.3 / plan Phase 10). Integration and e2e suites stay local on
# demand — they need Docker-heavy testcontainers and the GPU stack.
name: CI

on:
  push:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The unit suite exercises a real Docling pass-1 conversion on a
      # fixture PDF, which downloads layout/table models on first run —
      # cache them so CI pays that once per docling version.
      - name: Cache Docling models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: docling-models-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format --check)
        run: uv run ruff format --check .

      - name: Types (mypy)
        run: uv run mypy varagity

      - name: Unit tests (coverage floor 80%)
        run: uv run pytest

      - name: Docs (mkdocs build --strict)
        run: uv run mkdocs build --strict
