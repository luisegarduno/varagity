# Two parallel jobs on every push (spec §15.3), plus a
# main-only publish:
#   checks — Python gates: ruff lint/format, mypy, unit tests (coverage
#            floor 90%), strict mkdocs build.
#   web    — frontend gates: eslint, Vitest unit tests (lib/ coverage
#            floor), production next build.
#   pages  — publishes the site/ tree built by `checks` to GitHub Pages.
# Integration, e2e, and Playwright suites stay local on demand — they need
# Docker-heavy testcontainers and the live GPU stack.
name: CI

on:
  push:
  # Lets the docs be re-published without an empty commit.
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The unit suite exercises a real Docling pass-1 conversion on a
      # fixture PDF, which downloads layout/table models on first run —
      # cache them so CI pays that once per docling version.
      - name: Cache Docling models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: docling-models-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format --check)
        run: uv run ruff format --check .

      - name: Types (mypy)
        run: uv run mypy varagity

      - name: Unit tests (coverage floor 90%)
        run: uv run pytest

      - name: Docs (mkdocs build --strict)
        run: uv run mkdocs build --strict

      # Hand the exact bytes that just passed --strict to the `pages` job
      # instead of rebuilding them there. Only main deploys, so skip the
      # upload on every other branch.
      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Install bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      # setup-bun caches only the bun binary itself — cache the package
      # download cache explicitly, keyed on the lockfile.
      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}

      # Node stays the runtime: Vitest and next build execute under Node via
      # shebang delegation, matching the Dockerfile run stage.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (eslint)
        run: bun run lint

      - name: Unit tests (Vitest, lib/ coverage floor)
        run: bun run test --coverage

      # NEXT_PUBLIC_API_URL is inlined at build time (web/lib/api.ts falls
      # back to this same value when unset — pinned here for determinism).
      - name: Build (next build)
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # Publishing through the Actions pipeline — rather than a branch source — is
  # what keeps Pages from running Jekyll over the repo root and serving
  # README.md as the index. The artifact is served verbatim, so the underscore
  # directories Material emits survive and no .nojekyll is needed.
  pages:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write # create the Pages deployment
      id-token: write # OIDC token deploy-pages trades for it
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Job-scoped on purpose: ci.yml runs on every branch, and a workflow-level
    # group would serialize all of CI behind one lane. Deploys queue rather
    # than cancel, so a superseded run still finishes cleanly.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
