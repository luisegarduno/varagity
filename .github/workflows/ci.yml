# Two parallel jobs on every push (spec §15.3 / plan Phase 10):
#   checks — Python gates: ruff lint/format, mypy, unit tests (coverage
#            floor 80%), strict mkdocs build.
#   web    — frontend gates: eslint, Vitest unit tests (lib/ coverage
#            floor), production next build.
# Integration, e2e, and Playwright suites stay local on demand — they need
# Docker-heavy testcontainers and the live GPU stack.
name: CI

on:
  push:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The unit suite exercises a real Docling pass-1 conversion on a
      # fixture PDF, which downloads layout/table models on first run —
      # cache them so CI pays that once per docling version.
      - name: Cache Docling models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: docling-models-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format --check)
        run: uv run ruff format --check .

      - name: Types (mypy)
        run: uv run mypy varagity

      - name: Unit tests (coverage floor 80%)
        run: uv run pytest

      - name: Docs (mkdocs build --strict)
        run: uv run mkdocs build --strict

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      # No version input: pnpm/action-setup reads the "packageManager"
      # pin (pnpm@10.x) from web/package.json.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Unit tests (Vitest, lib/ coverage floor)
        run: pnpm test --coverage

      # NEXT_PUBLIC_API_URL is inlined at build time (web/lib/api.ts falls
      # back to this same value when unset — pinned here for determinism).
      - name: Build (next build)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
