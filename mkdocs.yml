site_name: Varagity
site_description: Self-hosted, GPU-accelerated RAG with Contextual Retrieval
# Project Pages serve from the repo subpath, not the domain root. Page-to-page
# links are relative and work without this, but sitemap.xml is emitted empty
# and canonical <link>s are omitted until site_url is set.
site_url: https://luisegarduno.github.io/varagity/
repo_url: https://github.com/luisegarduno/varagity
repo_name: luisegarduno/varagity

# ⚠️ Do NOT change this to the MkDocs default (`docs/`): in this repository
# `docs/` is the *gitignored ingest corpus* the RAG system indexes. The
# architecture documentation rendered by this site lives in `golden-docs/`.
docs_dir: golden-docs

# Broken intra-doc anchors default to INFO; promote them so `--strict`
# (which turns warnings into errors) actually enforces link integrity.
validation:
  links:
    anchors: warn

theme:
  name: material
  icon:
    logo: material/layers-search
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  # The web GUI's type system (web/app/layout.tsx): Geist for text, Geist Mono
  # for code (Instrument Serif display headings come via extra_css). The
  # privacy plugin localizes the Google Fonts downloads at build time.
  font:
    text: Geist
    code: Geist Mono
  # `custom` defers the color values to css/varagity.css, which carries the
  # web GUI's accent pair (hue 278 / chroma 0.14 — see web/app/globals.css).
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs # top-level nav as header tabs
    - navigation.indexes # adr/index.md + reference/index.md become section landing pages
    - navigation.instant # XHR page swaps (requires site_url, which is set above)
    - navigation.instant.progress
    - navigation.tracking # URL follows the active heading
    - navigation.top # back-to-top button on long pages (runbook, api)
    - navigation.footer # prev/next links
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link # api.md media-type tabs switch in unison

# Setting markdown_extensions replaces the MkDocs defaults (toc, tables,
# fenced_code) — they must be re-listed alongside our additions.
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  # attr_list + md_in_html power the Material grid cards on the landing page;
  # pymdownx.emoji renders :material-*: icon shortcodes as inline SVG from the
  # theme's bundled icon sets — resolved at build time, no external requests.
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # pymdownx.superfences supersedes the stdlib `fenced_code` (it renders the
  # same ```lang blocks) and adds the `mermaid` custom fence. Material bundles
  # Mermaid.js and re-themes diagrams on the light/slate palette toggle when it
  # sees this exact fence config — no plugin or extra dependency required.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # The neoteroi.mkdocsoad render (api.md) emits `??? note` collapsibles and
  # `=== "media-type"` tabs — these two extensions are what make them real.
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Downloads every external asset the pages reference (the Google Fonts
  # stylesheets + woff2 files from theme.font and extra_css) and rewrites the
  # output to self-hosted copies — the built site keeps working offline.
  # Needs network at build time; downloads are cached in .cache/ (gitignored).
  - privacy
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
  # Renders `[OAD(./openapi.json)]` on api.md from the checked-in schema
  # snapshot (regenerated by scripts/export_openapi.py, drift-guarded by
  # tests/unit/test_openapi_snapshot.py). use_pymdownx emits the tabbed/
  # details flavor configured above; styles are vendored (extra_css below).
  - neoteroi.mkdocsoad:
      use_pymdownx: true

# Vendored Neoteroi styles (no CDN — the built site must work offline):
# neoteroi-oad.css carries the OpenAPI-render selectors (method badges,
# operation separators, slate-palette overrides); neoteroi.css is the
# upstream compiled bundle, which predates the OAD stylesheet.
# The Google Fonts URL (Instrument Serif, the web GUI's display face) is the
# one external entry — the privacy plugin localizes it into the built site.
# varagity.css is the brand layer (custom palette values, display headings,
# card polish) and must load last so it wins the cascade.
extra_css:
  - css/neoteroi.css
  - css/neoteroi-oad.css
  - "https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
  - css/varagity.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luisegarduno/varagity
      name: Varagity on GitHub

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Data model: data-model.md
  - Pipelines: pipelines.md
  - Runbook: runbook.md
  - HTTP API: api.md
  - ADRs:
      - adr/index.md
      - ADR-001 pgvector over Qdrant: adr/ADR-001-pgvector-over-qdrant.md
      - ADR-002 infinity over FastEmbed: adr/ADR-002-infinity-over-fastembed.md
      - ADR-003 vertical build & ops choices: adr/ADR-003-vertical-build-and-ops-choices.md
      - ADR-004 OCR engine choice: adr/ADR-004-ocr-engine-choice.md
      - ADR-005 Web GUI + HTTP API stack: adr/ADR-005-web-stack-and-api.md
      - ADR-006 Re-ranking wired into the query path: adr/ADR-006-reranking-wired.md
      - ADR-007 Observability stack: adr/ADR-007-observability-stack.md
      - ADR-008 Chunking-strategy default: adr/ADR-008-chunking-default.md
      - ADR-009 Document modality expansion: adr/ADR-009-modality-expansion.md
      - ADR-010 Document page preview: adr/ADR-010-document-page-preview.md
  - API reference:
      - reference/index.md
      - Configuration & logging: reference/config.md
      - Model clients: reference/models.md
      - Ingestion: reference/ingest.md
      - Chunking: reference/chunking.md
      - Contextual Retrieval: reference/context.md
      - Stores: reference/stores.md
      - Retrieval: reference/retrieval.md
      - Generation: reference/generation.md
      - Orchestration: reference/pipeline.md
      - HTTP API: reference/api.md
      - Page preview: reference/preview.md
      - Observability: reference/observability.md
      - Evaluation: reference/eval.md
      - CLI & debug: reference/cli.md
